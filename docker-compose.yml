version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: drukpass
      POSTGRES_PASSWORD: drukpass
      POSTGRES_DB: drukpass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U drukpass"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://drukpass:drukpass@postgres:5432/drukpass
      DATABASE_SYNC_URL: postgresql://drukpass:drukpass@postgres:5432/drukpass
      REDIS_URL: redis://redis:6379
      SECRET_KEY: drukpass-demo-secret-key-change-in-production
      DEBUG: "false"
      ENVIRONMENT: production
      FRONTEND_URL: http://localhost:3000
      # Optional: set your Anthropic API key for LLM-enhanced features
      # ANTHROPIC_API_KEY: your-key-here
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: >
      sh -c "
        python -m alembic upgrade head &&
        python scripts/seed_demo.py &&
        uvicorn main:app --host 0.0.0.0 --port 8000 --reload
      "

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - backend

volumes:
  postgres_data:
